name: Metrics

# Gera um painel de métricas único, auto-hospedado no repo (sem rate-limit de
# serviços externos). Saída commitada em assets/metrics.svg e consumida pelo README.
#
# REQUISITO: criar um secret METRICS_TOKEN com um Personal Access Token (classic)
# com escopos: repo (ou public_repo) e read:org. Sem ele, o plugin de hábitos
# de código não renderiza.
on:
  schedule:
    - cron: "30 6 * * *" # diariamente às 06:30 UTC
  workflow_dispatch: # permite rodar manualmente na aba Actions

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Painel único: cabeçalho, atividade, linguagens (in-depth) e hábitos de código
      - name: Main metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Sao_Paulo
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_languages_details: bytes-size, percentage
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_charts: yes
          plugin_habits_facts: yes
