name: Generate Snake

# Gera a animação da "cobrinha" comendo o grafo de contribuições.
# A saída é publicada na branch `output` e consumida pelo README.
on:
  schedule:
    - cron: "0 6 * * *" # diariamente às 06:00 UTC
  workflow_dispatch: # permite rodar manualmente na aba Actions
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake-dark.svg?palette=github-dark
            dist/snake-light.svg?palette=github-light

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
