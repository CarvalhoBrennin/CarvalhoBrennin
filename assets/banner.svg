    <path d="M1090 0V380" stroke="#FFFFFF"/>
  </g>

  <rect x="56" y="44" width="1088" height="292" rx="28" fill="#050713" fill-opacity="0.84" stroke="#FFFFFF" stroke-opacity="0.14"/>
  <rect x="56" y="44" width="1088" height="46" rx="28" fill="#101827"/>
  <circle cx="88" cy="67" r="7" fill="#EF4444"/>
  <circle cx="114" cy="67" r="7" fill="#F59E0B"/>
