  <text x="88" y="238" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21">full-stack · React · .NET · Python · web &amp; desktop</text>
  <text x="88" y="277" fill="#94A3B8" font-family="Consolas, Monaco, monospace" font-size="18">ideia -&gt; código -&gt; teste -&gt; melhoria contínua</text>
  <rect x="88" y="302" width="560" height="10" rx="5" fill="url(#accent)" filter="url(#softGlow)"/>

